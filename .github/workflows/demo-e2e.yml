name: Demo E2E Smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  demo-e2e:
    name: Full Loop Demo Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Vigil
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run end-to-end demo
        run: |
          set -o pipefail
          mkdir -p examples/full_loop_demo/.vigil-data/ci
          ./examples/full_loop_demo/run_end_to_end.sh | tee examples/full_loop_demo/.vigil-data/ci/demo-e2e.log

      - name: Publish run summary
        if: always()
        run: |
          {
            echo "## Demo E2E Smoke"
            echo ""
            if [ -f examples/full_loop_demo/.vigil-data/ci/demo-e2e.log ]; then
              echo "- Log captured: \`examples/full_loop_demo/.vigil-data/ci/demo-e2e.log\`"
              echo "- Last 20 lines:"
              echo '```text'
              tail -n 20 examples/full_loop_demo/.vigil-data/ci/demo-e2e.log
              echo '```'
            else
              echo "- No demo log produced."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload demo artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-e2e-artifacts
          path: |
            examples/full_loop_demo/attacks/
            examples/full_loop_demo/.vigil-data/
          if-no-files-found: warn
