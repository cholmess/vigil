name: CI

on:
  push:
    branches: [main, local-1]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Run tests
        run: pytest --tb=short -q

  attack-replay:
    name: Attack Replay Gate
    runs-on: ubuntu-latest
    # Only run if there are attack snapshots present
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install vigil
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Import community attack patterns
        run: |
          mkdir -p tests/attacks
          vigil attacks import-community --attacks-dir tests/attacks/

      - name: Run attack replay (if snapshots exist)
        run: |
          if ls tests/attacks/*.bp.json 1>/dev/null 2>&1; then
            echo "Found attack snapshots — running BreakPoint replay"
            breakpoint attack tests/attacks/ --fail-on block || true
          else
            echo "No attack snapshots found — skipping replay"
          fi

  full-suite:
    name: Full Safety Suite
    runs-on: ubuntu-latest
    # Example of the full-suite workflow for repos that maintain baseline/candidate artifacts
    if: false  # Enable when you have baseline.json and candidate.json
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install vigil
        run: pip install -e ".[dev]"

      - name: Vigil Full Safety Suite
        run: |
          breakpoint evaluate baseline.json candidate.json --fail-on warn
          breakpoint attack tests/attacks/ --fail-on block
