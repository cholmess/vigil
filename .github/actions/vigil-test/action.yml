name: Vigil Test Gate
description: Run vigil test in CI and optionally write vigil-report.json.
inputs:
  prompt-file:
    description: Path to the system prompt file.
    required: false
    default: system_prompt.txt
  attacks-dir:
    description: Directory containing .bp.json attack snapshots.
    required: false
    default: tests/attacks
  python-version:
    description: Python version used to run vigil.
    required: false
    default: "3.11"
  report:
    description: When true, writes vigil-report.json.
    required: false
    default: "true"
  diff-aware:
    description: When true, run only snapshots relevant to prompt diff.
    required: false
    default: "false"
  base-ref:
    description: Git ref used by diff-aware mode (defaults to GITHUB_BASE_REF or HEAD~1).
    required: false
    default: ""
outputs:
  report-path:
    description: Path to the generated JSON report.
    value: vigil-report.json
runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Vigil
      shell: bash
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        pip install .

    - name: Run Vigil test gate
      shell: bash
      run: |
        set -euo pipefail
        prompt_file="${{ inputs.prompt-file }}"
        if [ ! -f "$prompt_file" ]; then
          if [ "$prompt_file" = "system_prompt.txt" ] && [ -f "examples/full_loop_demo/system_prompt.txt" ]; then
            echo "Prompt file '$prompt_file' not found; using examples/full_loop_demo/system_prompt.txt"
            prompt_file="examples/full_loop_demo/system_prompt.txt"
          else
            echo "Error: prompt file not found: $prompt_file" >&2
            exit 2
          fi
        fi
        cmd=(python -m vigil test --prompt-file "$prompt_file" --attacks-dir "${{ inputs.attacks-dir }}")
        if [ "${{ inputs.report }}" = "true" ]; then
          cmd+=(--report)
        fi
        if [ "${{ inputs.diff-aware }}" = "true" ]; then
          cmd+=(--diff-aware)
        fi
        if [ -n "${{ inputs.base-ref }}" ]; then
          cmd+=(--base-ref "${{ inputs.base-ref }}")
        fi
        "${cmd[@]}"
